<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ajax Shoutbox Simple</title>
    <style>
        #data { margin-top: 20px; padding: 10px; border-top: 1px solid #ccc; }
        .reply-item { background: #f0f0f0; margin-bottom: 5px; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Simple Shoutbox</h2>
    
    <form id="form1">
        <input type="text" name="msg" id="msg" placeholder="Ketik pesan..." required />
        <input type="button" value="Shout!" id="shoutbutton" />
    </form>

    <div id="data">
        <strong>Respon Server:</strong>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="index.js"></script>

</body>
</html>
