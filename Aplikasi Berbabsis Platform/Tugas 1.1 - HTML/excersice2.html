<doctype !HTML>
<html>
    <head>
        <title>Exercise 2</title>
    </head>
    <body>
        <form>
            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim"><br>
            <br>
            <label for="nama">Nama:</label>
            <input type="text" id="nama" name="nama"><br>
            <br>
            <label for="date">Tanggal Lahir:</label>
            <input type="date" id="date" name="date"><br>
            <br>
            <label for="gender">Jenis Kelamin:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Laki-laki</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Perempuan</label><br>
            <br>
            <label for="location">Lokasi di Bandung:</label>
            <textarea id="location" name="location"></textarea><br>
            <br>
            <label for="place">Tinggal di:</label>
            <select id="place" name="place">
                <option value="kos">Kos/kontrakan</option>
                <option value="saudara">Rumah saudara</option>
                <option value="ortu">Rumah Orang Tua</option>
            </select><br>
            <br>
            <label for="hobby">Pilih 2 hobi yang disukai:</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="sains">
            <label for="hobby1">Science</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="tech">
            <label for="hobby2">Technology</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="art">
            <label for="hobby3">Art</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="sport">
            <label for="hobby4">Sport</label><br>
            <br>
            <input type="reset" value="Reset">
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
